name: Perf (WebGL load-time TTFF)
run-name: "Perf TTFF${{ github.event.pull_request.number && format(' - PR #{0}', github.event.pull_request.number) || format(' - {0}', github.ref_name) }}"

# WebGL 로드타임 최적화 레버(L2~L12) PR별 효과(Δ)를 격리 측정하는 perf CI.
#
# 동작 개요:
#  - PR 게이트: `perf` 라벨이 달린 PR에서만 build/measure 실행(잡 레벨 if). 라벨 없으면
#    setup 잡만 돌고 끝(비용 0에 수렴). 라벨 = 측정 대상 레버 PR 전용 신호.
#  - 무거운 빌드: 재사용 워크플로 unity-build.yml에 perf 입력을 넘겨 HeavySampleUnityProject-{v}를
#    릴리즈+gzip으로 빌드(HeavyBuildRunner.CommandLineHeavyBuild). self-hosted unity-{v} 러너 재사용.
#  - TTFF 측정: ubuntu에서 빌드 산출물을 내려받아 pnpm run test:perf(perf-ttff.test.js) 실행.
#  - baseline Δ: main 푸시(push 이벤트)가 동일 매트릭스를 측정해 Actions 캐시에 baseline 저장.
#    PR 잡은 그 캐시를 복원해 Δ를 인라인 계산(부재 시 Δ 생략 — 부트스트랩 정상 경로).
#
# **기록 전용**: 하드 임계 게이트 없음(self-hosted 부하 변동으로 flaky). 회귀 게이트는 후속.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  push:
    branches: [main]
    # main에 무거운 픽스처/측정 코드가 바뀔 때만 baseline 재측정(불필요한 빌드 회피)
    paths:
      - 'Tests~/E2E/HeavySampleUnityProject-**'
      - 'Tests~/E2E/tests/perf-ttff.test.js'
      - 'Tests~/E2E/tests/playwright.perf.config.ts'
      - 'Tests~/E2E/SharedScripts/Editor/HeavyBuildRunner.cs'
      - '.github/workflows/perf.yml'
      - '.github/workflows/unity-build.yml'
      - '.github/scripts/generate-perf-report.js'
  workflow_dispatch:

concurrency:
  group: perf-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # =====================================================
  # 게이트 + 메타데이터
  # =====================================================
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
      is_baseline: ${{ steps.gate.outputs.is_baseline }}
      pr_number: ${{ steps.gate.outputs.pr_number }}
      head_ref: ${{ steps.gate.outputs.head_ref }}
      build_ref: ${{ steps.gate.outputs.build_ref }}
    steps:
      - name: Resolve gate
        id: gate
        env:
          # head_ref/branch는 신뢰 불가 입력 → env로 전달(스크립트 인젝션 방지)
          HEAD_REF: ${{ github.head_ref || github.ref_name }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_NAME: ${{ github.event_name }}
          PUSH_SHA: ${{ github.sha }}
          # perf 라벨 게이트: pull_request에서만 라벨을 본다.
          HAS_PERF_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'perf') }}
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            SHOULD_RUN=true;  IS_BASELINE=true;  BUILD_REF="$PUSH_SHA"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            SHOULD_RUN=true;  IS_BASELINE=false; BUILD_REF="$PUSH_SHA"
          else
            SHOULD_RUN="$HAS_PERF_LABEL"; IS_BASELINE=false; BUILD_REF="$PR_HEAD_SHA"
          fi
          {
            echo "should_run=${SHOULD_RUN}"
            echo "is_baseline=${IS_BASELINE}"
            echo "build_ref=${BUILD_REF}"
            echo "pr_number=${PR_NUMBER}"
            echo "head_ref=${HEAD_REF}"
          } >> "$GITHUB_OUTPUT"
          echo "event=$EVENT_NAME perf_label=$HAS_PERF_LABEL should_run=$SHOULD_RUN baseline=$IS_BASELINE"

  # =====================================================
  # 무거운 WebGL 빌드 (재사용 unity-build.yml, self-hosted)
  # =====================================================
  build-heavy:
    name: Build Heavy (Unity ${{ matrix.unity-version }})
    needs: setup
    if: needs.setup.outputs.should_run == 'true'

    strategy:
      fail-fast: false
      matrix:
        unity-version: ["2021.3", "6000.0", "6000.3"]

    uses: ./.github/workflows/unity-build.yml
    with:
      ref: ${{ needs.setup.outputs.build_ref }}
      os: macos
      unity-version: ${{ matrix.unity-version }}
      run-build: true
      run-editmode-test: false
      run-unit-test: false
      clean-library: false
      # ---- perf 입력: 무거운 픽스처 + 배포 동일 Release wasm + gzip(현실적 on-wire) ----
      project-dir-prefix: HeavySampleUnityProject
      build-method: HeavyBuildRunner.CommandLineHeavyBuild
      fast-build: false      # release wasm(배포·preview 와 동일 프로필) — dev build/Debug il2cpp 비활성
      compression-format: "1" # fast-build 가 표현 못 하는 유일 노브: gzip 으로 현실적 on-wire 측정
    secrets:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
      FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}

  # =====================================================
  # TTFF 측정 (ubuntu — WebGL 산출물은 OS 독립적)
  # =====================================================
  measure-ttff:
    name: Measure TTFF (Unity ${{ matrix.unity-version }})
    needs: [setup, build-heavy]
    if: needs.setup.outputs.should_run == 'true' && needs.build-heavy.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        unity-version: ["2021.3", "6000.0", "6000.3"]

    env:
      HEAVY_PROJECT: ${{ github.workspace }}/Tests~/E2E/HeavySampleUnityProject-${{ matrix.unity-version }}
      AIT_BUILD_DIR: ${{ github.workspace }}/Tests~/E2E/HeavySampleUnityProject-${{ matrix.unity-version }}/ait-build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.setup.outputs.build_ref }}

      - name: Download Heavy Build Artifact
        uses: actions/download-artifact@v8
        with:
          name: ait-build-heavy-macos-${{ matrix.unity-version }}
          path: ${{ env.AIT_BUILD_DIR }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        # version 미지정 → action-setup@v6 가 package.json 의 packageManager(pnpm@11.6.0)를
        # 그대로 설치. version 을 추가로 핀하면 "Multiple versions of pnpm specified" 충돌.
        uses: pnpm/action-setup@v6

      - name: Install AIT Build Dependencies
        # ait-build/ 안에서 vite preview 서버를 띄우려면 node_modules 필요.
        # --no-frozen-lockfile: 측정용 임시 설치이므로 정확한 deps 가 TTFF 에 영향 없음.
        # SDK 빌드 자체도 PnpmStoreManager.InstallStages(frozen→갱신→폐기→clean)로
        # lockfile 드리프트에 내성이 있다 — 여기선 그 비-frozen 단계를 직접 채택해
        # BuildConfig~ overrides 드리프트(#795)로 인한 ERR_PNPM_LOCKFILE_CONFIG_MISMATCH 회피.
        working-directory: ${{ env.AIT_BUILD_DIR }}
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright Test Dependencies
        working-directory: Tests~/E2E/tests
        # 브라우저는 runner image의 시스템 Chrome 사용(perf config: channel='chrome').
        run: pnpm install --no-frozen-lockfile

      - name: Run Perf (TTFF median-of-N)
        working-directory: Tests~/E2E/tests
        env:
          UNITY_PROJECT_PATH: ${{ env.HEAVY_PROJECT }}
          PERF_UNITY_VERSION: ${{ matrix.unity-version }}
          # 빌드와 동일 값으로 전파 — 결과 JSON의 buildType/compressionFormat에 기록
          AIT_DEVELOPMENT_BUILD: "false"
          AIT_COMPRESSION_FORMAT: "1"
        run: pnpm run test:perf

      - name: Upload Perf Result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-results-macos-${{ matrix.unity-version }}
          path: Tests~/E2E/tests/perf-results-${{ matrix.unity-version }}.json
          if-no-files-found: warn

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-playwright-report-${{ matrix.unity-version }}
          path: Tests~/E2E/tests/playwright-report/
          if-no-files-found: ignore
          compression-level: 9
          retention-days: 7

  # =====================================================
  # baseline 저장 (main 푸시에서만) — Actions 캐시에 적재
  # =====================================================
  save-baseline:
    name: Save Baseline Cache
    needs: [setup, measure-ttff]
    if: needs.setup.outputs.is_baseline == 'true' && needs.measure-ttff.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download Perf Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Assemble baseline directory
        run: |
          mkdir -p baseline
          for v in 2021.3 6000.0 6000.3; do
            src="artifacts/perf-results-macos-${v}/perf-results-${v}.json"
            if [ -f "$src" ]; then
              cp "$src" "baseline/baseline-${v}.json"
              echo "baseline ${v}: $(wc -c < "$src" | tr -d ' ') bytes"
            else
              echo "::warning::no perf result for ${v} — baseline not updated"
            fi
          done

      - name: Save baseline cache
        uses: actions/cache/save@v4
        with:
          path: baseline
          key: perf-baseline-all-${{ github.sha }}

  # =====================================================
  # 리포트 + PR 코멘트 (upsert)
  # =====================================================
  report:
    name: Perf Report
    needs: [setup, build-heavy, measure-ttff]
    if: always() && needs.setup.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.setup.outputs.build_ref }}

      - name: Download Perf Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Restore baseline cache
        # baseline 자신을 만드는 main 푸시 런에서는 복원 불필요(자기 자신이 baseline)
        if: needs.setup.outputs.is_baseline != 'true'
        uses: actions/cache/restore@v4
        with:
          path: baseline
          key: perf-baseline-all-${{ github.sha }}
          restore-keys: |
            perf-baseline-all-

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Generate Perf Report
        env:
          PERF_HEAD_REF: ${{ needs.setup.outputs.head_ref }}
          PERF_OS: macos
          PERF_UNITY_VERSIONS: "2021.3,6000.0,6000.3"
        run: node .github/scripts/generate-perf-report.js

      - name: Write Job Summary
        run: cat perf-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Perf Report
        uses: actions/upload-artifact@v7
        with:
          name: perf-report
          path: perf-report.md
          if-no-files-found: warn
          retention-days: 30

      - name: Post / Update PR Comment
        if: needs.setup.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ needs.setup.outputs.pr_number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          MARKER="<!-- perf-ttff-report -->"

          # 코멘트 본문 = 마커 + 리포트 + 실행 링크
          {
            echo "$MARKER"
            cat perf-report.md
            echo ""
            echo "---"
            echo "[View full run](https://github.com/${REPO}/actions/runs/${RUN_ID})"
          } > comment-body.md

          # 기존 perf 코멘트가 있으면 PATCH(upsert) — synchronize마다 새 코멘트 스팸 방지.
          # REST만 사용(GraphQL 미사용).
          EXISTING_ID=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" --paginate \
            --jq "map(select(.body | contains(\"${MARKER}\"))) | .[0].id // empty" 2>/dev/null || echo "")

          if [ -n "$EXISTING_ID" ]; then
            gh api "repos/${REPO}/issues/comments/${EXISTING_ID}" \
              -X PATCH -F body=@comment-body.md
            echo "Updated perf comment #${EXISTING_ID} on PR #${PR_NUMBER}"
          else
            gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
              -X POST -F body=@comment-body.md
            echo "Posted new perf comment on PR #${PR_NUMBER}"
          fi
