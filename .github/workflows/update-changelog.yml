name: Update API Changelog

on:
  push:
    branches:
      - main

jobs:
  update-changelog:
    name: Update API Changelog Report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Install Dependencies
        working-directory: sdk-runtime-generator~
        run: pnpm install --no-frozen-lockfile

      - name: Generate Report
        working-directory: sdk-runtime-generator~
        run: pnpm test:versions || true

      - name: Commit Report
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p docs/changelog
          cp sdk-runtime-generator~/reports/api-changelog.html docs/changelog/index.html
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            BRANCH="docs/update-changelog-$(date +%s)"
            git checkout -b "$BRANCH"
            git commit -m "문서: API Changelog 리포트 자동 갱신"
            git push -u origin "$BRANCH"
            gh pr create \
              --title "문서: API Changelog 리포트 자동 갱신" \
              --body "API Changelog 리포트를 자동 갱신합니다." \
              --base main \
              --head "$BRANCH"
            gh pr merge --merge --delete-branch
          fi
