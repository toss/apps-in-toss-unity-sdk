name: Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]

jobs:
  # =====================================================
  # SDK Generator Unit Tests
  # =====================================================
  sdk-generator-tests:
    name: SDK Generator Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Dependencies
        working-directory: sdk-runtime-generator~
        run: pnpm install --no-frozen-lockfile

      - name: Run Unit Tests (C#/jslib invariants)
        working-directory: sdk-runtime-generator~
        run: pnpm run test:tier2

  # =====================================================
  # API Changelog Report → Docs~/changelog/ (GitHub Pages)
  # =====================================================
  update-changelog:
    name: Update API Changelog Report
    needs: sdk-generator-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Dependencies
        working-directory: sdk-runtime-generator~
        run: pnpm install --no-frozen-lockfile

      - name: Generate Report
        working-directory: sdk-runtime-generator~
        run: pnpm test:versions || true

      - name: Commit Report
        run: |
          mkdir -p Docs~/changelog
          cp sdk-runtime-generator~/reports/api-changelog.html Docs~/changelog/index.html
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Docs~/changelog/index.html
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "문서: API Changelog 리포트 자동 갱신" && git push
