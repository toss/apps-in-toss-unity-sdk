<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | %UNITY_WEB_NAME%</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

    <!-- Unity Resource Early Fetch (SDK Auto-generated) -->
    %AIT_EARLY_FETCH_SCRIPT%

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #ffffff;
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        
        #unity-container {
            position: fixed;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
        }

        #unity-canvas {
            width: 100%;
            height: 100%;
            background: #231F20;
        }
        
        #unity-loading-bar {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            display: none;
        }
        
        #unity-logo {
            width: 154px;
            height: 130px;
            background: url('TemplateData/unity-logo-dark.png') no-repeat center;
        }
        
        #unity-progress-bar-empty {
            width: 141px;
            height: 18px;
            margin-top: 10px;
            margin-left: 6.5px;
            background: url('TemplateData/progress-bar-empty-dark.png') no-repeat center;
        }
        
        #unity-progress-bar-full {
            width: 0%;
            height: 18px;
            margin-top: 10px;
            background: url('TemplateData/progress-bar-full-dark.png') no-repeat center;
        }
        
        #unity-footer {
            display: none;  /* 전체 화면 모드에서는 footer 숨김 */
        }
        
        #unity-webgl-logo {
            float: left;
            width: 38px;
            height: 38px;
            background: url('TemplateData/webgl-logo.png') no-repeat center;
        }
        
        #unity-build-title {
            float: right;
            margin-right: 10px;
            line-height: 38px;
            font-family: arial;
            font-size: 18px;
        }
        
        #unity-fullscreen-button {
            cursor: pointer;
            float: right;
            width: 38px;
            height: 38px;
            background: url('TemplateData/fullscreen-button.png') no-repeat center;
        }
        
        #unity-warning {
            position: absolute;
            left: 50%;
            top: 5%;
            transform: translate(-50%, 0);
            background: white;
            border: 2px solid red;
            padding: 5px;
            display: none;
        }

        /* Apps in Toss Toast */
        .ait-toast {
            position: fixed;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 20px;
            border-radius: 20px;
            font-size: 14px;
            max-width: 300px;
            text-align: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .ait-toast.show {
            opacity: 1;
        }
        
        .ait-toast.top {
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .ait-toast.center {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .ait-toast.bottom {
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Apps in Toss Modal */
        .ait-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 10000;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
        }
        
        .ait-modal-content {
            background: white;
            border-radius: 12px;
            padding: 20px;
            max-width: 320px;
            width: 90%;
            text-align: center;
        }
        
        .ait-modal-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }
        
        .ait-modal-message {
            font-size: 14px;
            line-height: 1.4;
            margin-bottom: 20px;
            color: #666;
        }
        
        .ait-modal-buttons {
            display: flex;
            gap: 10px;
        }
        
        .ait-modal-button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .ait-modal-button.primary {
            background: #3182ce;
            color: white;
        }
        
        .ait-modal-button.primary:hover {
            background: #2c5aa0;
        }
        
        .ait-modal-button.secondary {
            background: #e2e8f0;
            color: #4a5568;
        }
        
        .ait-modal-button.secondary:hover {
            background: #cbd5e0;
        }
    </style>

    <!-- USER_HEAD_START - 이 영역에 사용자 커스텀 스크립트/스타일을 추가하세요 -->

<body>

    <!-- Debug Console (vConsole) — 빌드 프로필로 게이팅, dev 전용. Unity 로더보다 먼저 로드해 조기 로그 캡처 -->
    <script>
        (function () {
            if ('%AIT_ENABLE_DEBUG_CONSOLE%' !== 'true') return;   // prod: 조기 반환, 아무것도 로드 안 함
            var v = document.createElement('script');

                document.head.appendChild(s);

    <!-- AITLoading: 커스텀 로딩 화면 API -->
    <script>
        window.AITLoading = {
            // 앱 정보 (초기화 전 기본값)
            appInfo: {
                iconUrl: '',
                displayName: '',
                primaryColor: '#3182f6'
            },

            // 초기화 완료 여부 (내부용)
            _initialized: false,
            _readyCallbacks: [],
            _progressCallbacks: [],
            _completeCallbacks: [],
            _errorCallbacks: [],
            _isComplete: false,

            // 초기화 완료 콜백 등록 (appInfo 사용 가능 시점)
            // 콜백은 초기화 시 호출되고, 네이티브 앱 정보가 나중에 로드되면 다시 호출됨
            onReady: function(callback) {
                if (typeof callback === 'function') {
                    // 항상 콜백 저장 (네이티브 정보 업데이트 시 다시 호출하기 위해)
                    this._readyCallbacks.push(callback);
                    // 이미 초기화된 경우 바로 호출
                    if (this._initialized) {
                        callback(this.appInfo);
                    }
                }
            },

            // 진행률 콜백 등록
            onProgress: function(callback) {
                if (typeof callback === 'function') {
                    this._progressCallbacks.push(callback);
                }
            },

            // 완료 콜백 등록
            onComplete: function(callback) {
                if (typeof callback === 'function') {
                    if (this._isComplete) {
                        callback();
                    } else {
                        this._completeCallbacks.push(callback);
                    }
                }
            },

            // 에러 콜백 등록
            onError: function(callback) {
                if (typeof callback === 'function') {
                    this._errorCallbacks.push(callback);
                }
            },

            // 로딩 화면 숨기기
            hide: function() {
                var wrapper = document.getElementById('ait-loading-wrapper');
                if (wrapper) {
                    wrapper.style.display = 'none';
                }
            }
        };
    </script>

    <!-- 브랜드 정보 초기화 -->
    <script>
        // Unity 빌드 시 플레이스홀더가 치환됨 (기본값)
        window.AITLoading.appInfo = {
            iconUrl: '%AIT_ICON_URL%',
            displayName: '%AIT_DISPLAY_NAME%',
            primaryColor: '%AIT_PRIMARY_COLOR%'
        };
        console.log('[AIT Loading] 빌드 설정 appInfo:', JSON.stringify(window.AITLoading.appInfo));

        // 네이티브 앱 정보로 업데이트하는 함수
        function updateAppInfoFromNative() {
            try {
                console.log('[AIT Loading] AppsInToss 존재:', !!window.AppsInToss);
                if (window.AppsInToss) {
                    console.log('[AIT Loading] getAppsInTossGlobals 존재:', typeof window.AppsInToss.getAppsInTossGlobals);
                }
                if (window.AppsInToss && typeof window.AppsInToss.getAppsInTossGlobals === 'function') {
                    var globals = window.AppsInToss.getAppsInTossGlobals();
                    console.log('[AIT Loading] 네이티브 globals 원본:', JSON.stringify(globals));
                    if (globals) {
                        // brandIcon이 있으면 사용, 없으면 빌드 설정 유지
                        if (globals.brandIcon) {
                            window.AITLoading.appInfo.iconUrl = globals.brandIcon;
                            console.log('[AIT Loading] 아이콘 URL 업데이트:', globals.brandIcon);
                        } else {
                            console.log('[AIT Loading] brandIcon 없음, 빌드 설정 유지:', window.AITLoading.appInfo.iconUrl);
                        }
                        if (globals.brandDisplayName) {
                            window.AITLoading.appInfo.displayName = globals.brandDisplayName;
                        }
                        if (globals.brandPrimaryColor) {
                            window.AITLoading.appInfo.primaryColor = globals.brandPrimaryColor;
                        }
                        console.log('[AIT Loading] 최종 appInfo:', JSON.stringify(window.AITLoading.appInfo));
                        return true;
                    }
                }
            } catch (e) {
                console.warn('[AIT Loading] 네이티브 앱 정보 로드 실패:', e);
            }
            return false;
        }

        // 네이티브 브릿지 대기 및 초기화 완료 처리
        function initializeAppInfo() {
            // 먼저 동기적으로 시도
            var nativeLoaded = updateAppInfoFromNative();

            if (!nativeLoaded) {
                // 네이티브 브릿지가 아직 없으면 짧은 시간 대기 후 재시도
                // 토스 앱에서 브릿지 주입이 약간 지연될 수 있음
                var maxAttempts = 10;
                var attempt = 0;
                var checkInterval = setInterval(function() {
                    attempt++;
                    if (updateAppInfoFromNative()) {
                        clearInterval(checkInterval);
                        console.log('[AIT Loading] 네이티브 브릿지 감지됨 (시도 ' + attempt + ')');
                        // 이미 초기화된 경우 콜백 다시 호출하여 UI 업데이트
                        if (window.AITLoading._initialized) {
                            window.AITLoading._readyCallbacks.forEach(function(cb) {
                                try { cb(window.AITLoading.appInfo); } catch(e) {}
                            });
                        }
                    } else if (attempt >= maxAttempts) {
                        clearInterval(checkInterval);
                        console.log('[AIT Loading] 네이티브 브릿지 없음, 빌드 설정 사용');
                    }
                }, 50); // 50ms 간격으로 최대 500ms 대기
            }

            // 초기화 완료 표시 및 대기 중인 콜백 호출
            window.AITLoading._initialized = true;
            window.AITLoading._readyCallbacks.forEach(function(cb) {
                try { cb(window.AITLoading.appInfo); } catch(e) { console.error('[AIT Loading] onReady callback error:', e); }
            });
            // 주의: _readyCallbacks를 비우지 않음 - 네이티브 정보가 나중에 로드될 때 다시 호출하기 위해
        }

        initializeAppInfo();
    </script>

    <!-- 에러 표시 함수 (Unity Loader보다 먼저 정의) -->
    <script>
        // 에러 표시 함수
        function showLoadError(title, message, hints, debugInfo) {
            console.error('[AIT] ' + title);
            console.error('[AIT] ' + message);
            if (hints) {
                hints.forEach(function(hint) {
                    console.error('[AIT]   - ' + hint);
                });
            }
            if (debugInfo) {
                console.error('[AIT] Debug info:', JSON.stringify(debugInfo, null, 2));
            }

            // 로딩 화면을 에러 화면으로 변경
            var wrapper = document.getElementById('ait-loading-wrapper');
            if (wrapper) {
                wrapper.innerHTML =
                    '<div style="padding: 20px; text-align: center; max-width: 400px;">' +
                        '<div style="font-size: 48px; margin-bottom: 20px;">⚠️</div>' +
                        '<div style="font-size: 18px; font-weight: bold; margin-bottom: 10px; color: #ff6b6b;">' + title + '</div>' +
                        '<div style="font-size: 14px; margin-bottom: 20px; color: #ccc;">' + message + '</div>' +
                        '<div style="font-size: 12px; text-align: left; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; color: #aaa;">' +
                            '<div style="font-weight: bold; margin-bottom: 8px;">가능한 해결 방법:</div>' +
                            '<ul style="margin: 0; padding-left: 20px;">' +
                                (hints ? hints.map(function(h) { return '<li style="margin-bottom: 4px;">' + h + '</li>'; }).join('') : '') +
                            '</ul>' +
                        '</div>' +
                        '<div style="margin-top: 20px;">' +
                            '<button onclick="location.reload()" style="padding: 10px 20px; background: #4a90d9; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px;">다시 시도</button>' +
                        '</div>' +
                    '</div>';
            }
        }

        // Loader 스크립트 로드 상태 추적
        window._aitLoaderLoaded = false;
    </script>

    <!-- Unity Loader Script -->
    <script src="%UNITY_WEBGL_LOADER_URL%" onerror="showLoadError('Unity Loader 스크립트 로드 실패', '게임을 시작하는 데 필요한 파일을 불러올 수 없습니다.', ['파일 경로: %UNITY_WEBGL_LOADER_URL%', '서버에서 파일이 제공되고 있는지 확인하세요.', '브라우저 개발자 도구의 Network 탭을 확인하세요.'], {url: '%UNITY_WEBGL_LOADER_URL%'});" onload="window._aitLoaderLoaded = true; console.log('[AIT] ✓ Unity Loader 스크립트 로드 완료');"></script>

    <script>
        var container = document.querySelector("#unity-container");
        var canvas = document.querySelector("#unity-canvas");
        var loadingBar = document.querySelector("#unity-loading-bar");
        var progressBarFull = document.querySelector("#unity-progress-bar-full");
        var fullscreenButton = document.querySelector("#unity-fullscreen-button");
        var warningBanner = document.querySelector("#unity-warning");
        var aitLoading = document.querySelector("#ait-loading-wrapper");

        // 배너 표시 함수
        function unityShowBanner(msg, type) {
            function updateBannerVisibility() {
                warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
            }
            var div = document.createElement('div');
            div.innerHTML = msg;
            warningBanner.appendChild(div);
            if (type == 'error') div.style = 'background: red; padding: 10px;';
            else {
                if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
                setTimeout(function() {
                    warningBanner.removeChild(div);
                    updateBannerVisibility();
                }, 5000);
            }
            updateBannerVisibility();
        }

        var loaderUrl = "%UNITY_WEBGL_LOADER_URL%";
        var config = {
            dataUrl: "%UNITY_WEBGL_DATA_URL%",
            frameworkUrl: "%UNITY_WEBGL_FRAMEWORK_URL%",
            codeUrl: "%UNITY_WEBGL_CODE_URL%",
#if MEMORY_FILENAME
            memoryUrl: "%UNITY_WEBGL_MEMORY_URL%",
#endif
#if SYMBOLS_FILENAME
            symbolsUrl: "%UNITY_WEBGL_SYMBOLS_URL%",
#endif
            streamingAssetsUrl: "StreamingAssets",
            companyName: "%UNITY_COMPANY_NAME%",
            productName: "%UNITY_PRODUCT_NAME%",
            productVersion: "%UNITY_PRODUCT_VERSION%",
            showBanner: unityShowBanner,
        };

        // 모바일 감지 및 최적화
        var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

        // devicePixelRatio 설정: -1 = auto, 1/2/3 = 고정값
        var aitDevicePixelRatioSetting = %AIT_DEVICE_PIXEL_RATIO%;

        // first-interactive 계측 활성 여부.
        // 빌드 시 %AIT_FIRST_INTERACTIVE_LOG% 플레이스홀더가 "true"/"false"로 치환됨.
        // 미치환 리터럴('%AIT_FIRST_INTERACTIVE_LOG%')은 "false"와 다르므로 true로 평가 — fail-open.
        window.__AIT_FIRST_INTERACTIVE_LOG = '%AIT_FIRST_INTERACTIVE_LOG%' !== 'false';

        // 기기 성능에 따른 최적 devicePixelRatio 계산
        function getOptimalDevicePixelRatio() {
            var baseRatio = window.devicePixelRatio || 1;

            // 고정값인 경우 (기기 기본값을 초과하지 않도록)
            if (aitDevicePixelRatioSetting > 0) {
                return Math.min(aitDevicePixelRatioSetting, baseRatio);
            }

            // auto: 기기 성능에 따라 결정
            var deviceMemory = navigator.deviceMemory; // Android Chrome에서만 지원
            var cores = navigator.hardwareConcurrency || 2;
            var isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);

            // GPU 정보 확인 (저사양 GPU 감지)
            var isLowEndGPU = false;
            try {
                var testCanvas = document.createElement('canvas');
                var gl = testCanvas.getContext('webgl2') || testCanvas.getContext('webgl');
                if (gl) {
                    var debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                    if (debugInfo) {
                        var renderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                        isLowEndGPU = /Mali-4|Mali-T[0-6]|Adreno [0-4]|PowerVR SGX|Intel HD [0-5]/i.test(renderer);
                    }
                }
            } catch (e) {}

            // 저사양 판정: GPU 또는 코어 수 기준
            if (isLowEndGPU || cores <= 2) {
                return 1;
            }

            // Android: deviceMemory API 사용
            if (deviceMemory !== undefined) {
                if (deviceMemory <= 2) return 1;
                if (deviceMemory <= 4) return Math.min(baseRatio, 2);
                return baseRatio;
            }

            // iOS: 화면 크기 + 코어 수로 세대 추정
            if (isIOS) {
                var screenPixels = screen.width * screen.height;
                // 구형 iPhone (6s/7/8 등): 낮은 해상도 + 적은 코어
                if (screenPixels < 400000 || cores <= 4) {
                    return Math.min(baseRatio, 2);
                }
                return baseRatio;
            }

            // 기타: 안전하게 최대 2로 제한
            return Math.min(baseRatio, 2);
        }

        // 모바일에서만 devicePixelRatio 조정 적용
        if (isMobile) {
            config.devicePixelRatio = getOptimalDevicePixelRatio();
            console.log('[AIT] 모바일 환경 - devicePixelRatio:', config.devicePixelRatio,
                        '(설정:', aitDevicePixelRatioSetting === -1 ? 'auto' : aitDevicePixelRatioSetting, ')');
        } else {
            console.log('[AIT] 데스크톱 환경 - devicePixelRatio: 기본값 사용');
        }

        // WebGL context 실패 시 상세 원인 진단
        function diagnoseWebGLContext() {
            try {
                var report = {};
                var testCanvas = document.createElement('canvas');

                // 1. WebGL2/WebGL1 지원 여부
                var gl2 = null, gl1 = null;
                try { gl2 = testCanvas.getContext('webgl2'); } catch(e) {}
                try { gl1 = testCanvas.getContext('webgl'); } catch(e) {}
                report.webgl2 = !!gl2;
                report.webgl1 = !!gl1;

                var gl = gl2 || gl1;
                if (gl) {
                    // 2. GPU 정보
                    var dbgInfo = gl.getExtension('WEBGL_debug_renderer_info');
                    if (dbgInfo) {
                        report.vendor = gl.getParameter(dbgInfo.UNMASKED_VENDOR_WEBGL);
                        report.renderer = gl.getParameter(dbgInfo.UNMASKED_RENDERER_WEBGL);
                    }
                    // 3. 주요 제한값
                    report.maxTextureSize = gl.getParameter(gl.MAX_TEXTURE_SIZE);
                    report.maxRenderBufferSize = gl.getParameter(gl.MAX_RENDERBUFFER_SIZE);
                    report.maxViewportDims = Array.from(gl.getParameter(gl.MAX_VIEWPORT_DIMS));

                    // 4. context 속성
                    var attrs = gl.getContextAttributes();
                    if (attrs) {
                        report.antialias = attrs.antialias;
                        report.powerPreference = attrs.powerPreference;
                        report.desynchronized = attrs.desynchronized;
                        report.failIfMajorPerformanceCaveat = attrs.failIfMajorPerformanceCaveat;
                        report.preserveDrawingBuffer = attrs.preserveDrawingBuffer;
                    }

                    // 5. context lost 상태
                    report.isContextLost = gl.isContextLost();

                    // context 정리
                    var loseExt = gl.getExtension('WEBGL_lose_context');
                    if (loseExt) loseExt.loseContext();
                }

                // 6. 시스템 정보
                report.deviceMemory = navigator.deviceMemory || 'N/A';
                report.hardwareConcurrency = navigator.hardwareConcurrency || 'N/A';
                report.userAgent = navigator.userAgent;
                report.devicePixelRatio = window.devicePixelRatio;

                return report;
            } catch (diagError) {
                return { error: 'Diagnosis failed: ' + diagError.message };
            }
        }

        // 로딩 진행률 업데이트
        function updateLoadingProgress(progress) {
            // AITLoading 콜백 통지 (loading.html에서 UI 업데이트 처리)
            var callbacks = window.AITLoading._progressCallbacks;
            for (var i = 0; i < callbacks.length; i++) {
                try {
                    callbacks[i](progress);
                } catch (e) {
                    console.error('[AIT Loading] Progress callback error:', e);
                }
            }
        }

        // 로딩 화면 숨기기
        function hideLoadingScreen() {
            // 완료 콜백 호출
            if (!window.AITLoading._isComplete) {
                window.AITLoading._isComplete = true;
                var callbacks = window.AITLoading._completeCallbacks;
                for (var i = 0; i < callbacks.length; i++) {
                    try {
                        callbacks[i]();
                    } catch (e) {
                        console.error('[AIT Loading] Complete callback error:', e);
                    }
                }
            }

            aitLoading.style.display = 'none';
        }

        loadingBar.style.display = "block";

        // Unity 로드 시작
        console.log('[AIT] Unity 로딩 시작...');

        // Loader 스크립트 로드 완료 대기 함수
        // Race condition 방지: loader 스크립트가 비동기로 로드되므로 완료를 기다림
        function waitForLoader(callback, timeoutMs) {
            var startTime = Date.now();
            var checkInterval = setInterval(function() {
                if (window._aitLoaderLoaded || typeof createUnityInstance !== 'undefined') {
                    clearInterval(checkInterval);
                    console.log('[AIT] ✓ Loader 스크립트 준비 완료 (' + (Date.now() - startTime) + 'ms)');
                    callback(true);
                } else if (Date.now() - startTime > timeoutMs) {
                    clearInterval(checkInterval);
                    console.error('[AIT] ✗ Loader 스크립트 로드 타임아웃 (' + timeoutMs + 'ms)');
                    callback(false);
                }
            }, 50);
        }

        // Loader 로드 완료 대기 (최대 10초)
        waitForLoader(function(loaderReady) {
            updateLoadingProgress(0.1);

            // createUnityInstance 존재 여부 확인
            if (!loaderReady || typeof createUnityInstance === 'undefined') {
                console.error('[AIT] ========================================');
                console.error('[AIT] ✗ createUnityInstance is not defined!');
                console.error('[AIT] ========================================');
                console.error('[AIT] Unity Loader 스크립트가 정상적으로 로드되지 않았습니다.');
                console.error('[AIT] ');
                console.error('[AIT] 가능한 원인:');
                console.error('[AIT]   1. loader.js 파일 경로가 잘못되었습니다.');
                console.error('[AIT]   2. loader.js 파일이 서버에 존재하지 않습니다.');
                console.error('[AIT]   3. 빌드 시 loader.js 파일을 찾지 못했습니다.');
                console.error('[AIT]   4. 네트워크가 느리거나 타임아웃되었습니다.');
                console.error('[AIT] ');
                console.error('[AIT] 확인할 사항:');
                console.error('[AIT]   - 설정된 로더 URL: %UNITY_WEBGL_LOADER_URL%');
                console.error('[AIT]   - Loader 스크립트 로드 상태: ' + (window._aitLoaderLoaded ? '성공' : '실패/대기중'));
                console.error('[AIT] ========================================');

                // 빌드 파일 정보 출력
                console.error('[AIT] 현재 빌드 설정:');
                console.error('[AIT]   - dataUrl:', config.dataUrl);
                console.error('[AIT]   - frameworkUrl:', config.frameworkUrl);
                console.error('[AIT]   - codeUrl:', config.codeUrl);

                showLoadError(
                    'Unity 엔진 초기화 실패',
                    'createUnityInstance 함수를 찾을 수 없습니다.',
                    [
                        'Unity WebGL 빌드가 손상되었을 수 있습니다.',
                        '개발자에게 문의하거나, 잠시 후 다시 시도해 주세요.',
                        '(개발자용) Unity Editor에서 Clean Build를 실행하세요.'
                    ],
                    {
                        loaderUrl: '%UNITY_WEBGL_LOADER_URL%',
                        loaderLoaded: window._aitLoaderLoaded || false,
                        loaderTimedOut: !loaderReady,
                        config: config
                    }
                );
            } else {
                // 정상적으로 로드된 경우 실행
                console.log('[AIT] ✓ createUnityInstance 함수 확인됨');

                // GLctx / WebGL context 에러 방어
                //
                // WebGL context 생성 실패 시 Unity(Emscripten)가 GfxDeviceGLES 소멸자에서
                // GL.deleteContext를 호출하는데, 이때 GL.contexts[handle]이 undefined여서
                // "Cannot read properties of undefined (reading 'GLctx')" 크래시 발생.
                //
                // GL 객체는 Emscripten framework.js blob 내부의 모듈 스코프 변수이므로
                // window에서 직접 접근할 수 없음. 따라서 window error 이벤트로 감지하고,
                // 에러를 가로채서 사용자 친화적인 메시지로 표시함.
                //
                // _aitGLErrorHandled 플래그로 .catch() 핸들러의 중복 에러 표시를 방지.
                window._aitGLErrorHandled = false;

                // WebGL 에러 공통 처리 함수
                function handleWebGLError(errorStr, source) {
                    window.removeEventListener('error', _aitGLErrorHandler);
                    window._aitGLErrorHandled = true;

                    var diag = window._aitWebGLDiag || diagnoseWebGLContext();
                    var creationError = window._aitWebGLCreationError;
                    console.error('[AIT] WebGL context 에러 감지 (' + source + '):', errorStr);
                    if (creationError) {
                        console.error('[AIT] WebGL context 생성 실패 원인:', creationError);
                    }
                    console.error('[AIT] WebGL 진단 정보:', JSON.stringify(diag, null, 2));

                    // 에러 유형별 분류
                    var isContextTypeConflict = creationError && creationError.indexOf('existing context') !== -1;

                    if (isContextTypeConflict) {
                        console.error('[AIT] ⚠️ WebGL context 타입 충돌 감지');
                        console.error('[AIT]   원인: 동일 canvas에 서로 다른 WebGL 버전의 context가 생성됨');
                        console.error('[AIT]   해결: Unity Player Settings > Graphics APIs에서 OpenGLES2를 제거하고 OpenGLES3(WebGL 2.0)만 남기세요');
                        showLoadError(
                            'WebGL 초기화 실패',
                            'WebGL context 타입이 충돌합니다. 빌드 설정을 확인해 주세요.',
                            [
                                '(개발자용) Player Settings > Graphics APIs에서 OpenGLES2를 제거해 주세요.',
                                '앱을 종료하고 다시 시도해 주세요.',
                                '문제가 지속되면 개발자에게 문의해 주세요.'
                            ],
                            { error: errorStr, creationError: creationError, webglDiag: diag }
                        );
                    } else {
                        showLoadError(
                            'WebGL 초기화 실패',
                            '기기의 메모리가 부족하거나 WebGL을 지원하지 않습니다.',
                            [
                                '다른 앱을 종료한 후 다시 시도해 주세요.',
                                '기기를 재시작하면 도움이 될 수 있습니다.'
                            ],
                            { error: errorStr, creationError: creationError || null, webglDiag: diag }
                        );
                    }
                }

                function _aitGLErrorHandler(e) {
                    if (e.message && (e.message.indexOf('GLctx') !== -1 || e.message.indexOf('WebGL context') !== -1)) {
                        handleWebGLError(e.message, 'window.error');
                        e.preventDefault();
                    }
                }
                window.addEventListener('error', _aitGLErrorHandler);

                // WebGL context 생성 실패 시 브라우저 이벤트 캡처
                // Unity가 내부적으로 canvas.getContext()를 호출할 때 실패하면 이 이벤트 발생
                canvas.addEventListener('webglcontextcreationerror', function(e) {
                    console.error('[AIT] webglcontextcreationerror 이벤트:', e.statusMessage);
                    // 진단 정보를 미리 수집해두어 .catch()에서 활용
                    window._aitWebGLCreationError = e.statusMessage;
                    window._aitWebGLDiag = diagnoseWebGLContext();
                    console.error('[AIT] WebGL 진단 정보:', JSON.stringify(window._aitWebGLDiag, null, 2));
                });

                canvas.addEventListener('webglcontextlost', function(e) {
                    console.error('[AIT] webglcontextlost 이벤트 발생');
                    e.preventDefault();
                });

                createUnityInstance(canvas, config, (progress) => {
                    var unityProgress = 0.1 + (progress * 0.9); // 10%부터 시작해서 100%까지
                    updateLoadingProgress(unityProgress);
                    progressBarFull.style.width = 100 * progress + "%";
                }).then((unityInstance) => {
            window.removeEventListener('error', _aitGLErrorHandler);
            updateLoadingProgress(1.0);
            loadingBar.style.display = "none";
            fullscreenButton.onclick = () => {
                unityInstance.SetFullscreen(1);
            };

            // Unity 인스턴스를 글로벌로 저장
            window.unityInstance = unityInstance;

            // 로드 성공 시 재시도 카운터 초기화
            try { sessionStorage.removeItem('__ait_reload_count__'); } catch (e) {}

            console.log('[AIT] ✓ Unity 인스턴스 로드 완료');

            // Apps in Toss Unity Bridge 초기화
            if (typeof AppsInTossUnityBridge !== 'undefined') {
                AppsInTossUnityBridge.setUnityInstance(unityInstance);
                console.log('[AIT] ✓ Apps in Toss Unity Bridge 초기화 완료');
            }

            // 로딩 화면 숨기기
            console.log('[AIT] ✓ 게임 로딩 완료!');
            setTimeout(hideLoadingScreen, 500);

                }).catch((message) => {
                    // GLctx 에러는 _aitGLErrorHandler에서 이미 처리됨
                    if (window._aitGLErrorHandled) {
                        console.log('[AIT] GLctx 에러는 이미 처리되었습니다.');
                        return;
                    }

                    var errorStr = typeof message === 'object' ? (message.message || String(message)) : String(message);
                    console.error('[AIT] ✗ Unity 로드 실패:', errorStr);

                    // WebGL context 실패 감지 (Promise rejection으로 전파된 경우)
                    // 에러 콜백보다 먼저 체크하여, WebGL 에러 시 일반 에러 콜백이 불필요하게 호출되지 않도록 함
                    var isWebGLError = /GLctx|WebGL context|Unable to create/i.test(errorStr);
                    if (isWebGLError) {
                        handleWebGLError(errorStr, '.catch');
                        return;
                    }

                    // 에러 콜백 호출 (WebGL 에러가 아닌 경우만)
                    var errorCallbacks = window.AITLoading._errorCallbacks;
                    for (var i = 0; i < errorCallbacks.length; i++) {
                        try {
                            errorCallbacks[i]({ message: errorStr });
                        } catch (e) {
                            console.error('[AIT Loading] Error callback error:', e);
                        }
                    }

                    // ASM_CONSTS 초기화 타이밍 오류 감지 시 자동 재시도
                    // Unity WASM 런타임의 레이스 컨디션으로 ASM_CONSTS 배열이 아직 초기화되지 않은 상태에서
                    // emscripten_asm_const_int_sync_on_main_thread가 호출될 수 있음
                    var isAsmConstsError = /ASM_CONSTS/.test(errorStr);
                    var retryKey = '__ait_reload_count__';
                    var maxRetries = 2;
                    var currentRetries = parseInt(sessionStorage.getItem(retryKey) || '0', 10);

                    if (isAsmConstsError && currentRetries < maxRetries) {
                        sessionStorage.setItem(retryKey, String(currentRetries + 1));
                        console.warn('[AIT] ASM_CONSTS 초기화 오류 감지, 자동 재시도 (' + (currentRetries + 1) + '/' + maxRetries + ')');
                        location.reload();
                        return;
                    }

                    // 재시도 횟수 초기화 (다른 에러이거나 재시도 소진)
                    sessionStorage.removeItem(retryKey);

                    showLoadError(
                        '게임 로드 실패',
                        errorStr,
                        [
                            '네트워크 연결 상태를 확인해 주세요.',
                            '잠시 후 다시 시도해 주세요.',
                            '문제가 계속되면 앱을 재시작해 주세요.'
                        ],
                        {
                            error: errorStr,
                            retryCount: currentRetries,
                            config: { dataUrl: config.dataUrl, frameworkUrl: config.frameworkUrl, codeUrl: config.codeUrl }
                        }
                    );
                });
            } // end of else block for createUnityInstance check
        }, 10000); // waitForLoader 타임아웃: 10초
    </script>
